<!DOCTYPE html>
<html>
<head>
    <title>API Stream Test</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #0f0; }
        #output { white-space: pre-wrap; border: 1px solid #333; padding: 10px; height: 400px; overflow-y: auto; }
        button { margin: 10px 0; padding: 10px 20px; }
    </style>
</head>
<body>
    <h1>API Stream Test</h1>
    <button onclick="testStream()">Test /api/fix Stream</button>
    <div id="output"></div>

    <script>
        async function testStream() {
            const output = document.getElementById('output');
            output.innerHTML = 'Starting stream test...\n\n';

            try {
                const response = await fetch('http://localhost:8000/api/fix', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        repo_url: 'aadi230763/CodeJanitorTesting',
                        vulnerability_id: 1,
                        vulnerability: {
                            id: '1',
                            title: 'Hardcoded credentials',
                            file: 'api_service.py',
                            line: 3,
                            riskScore: 9,
                            type: 'Hardcoded credentials',
                            description: 'API key exposed'
                        }
                    })
                });

                output.innerHTML += 'Response status: ' + response.status + '\n';
                output.innerHTML += 'Content-Type: ' + response.headers.get('content-type') + '\n\n';

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) {
                        output.innerHTML += '\n=== Stream ended ===\n';
                        break;
                    }

                    const chunk = decoder.decode(value, { stream: true });
                    buffer += chunk;
                    
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (!line.trim()) continue;
                        try {
                            const data = JSON.parse(line);
                            output.innerHTML += `[${data.phase}] ${data.message}\n`;
                            output.scrollTop = output.scrollHeight;
                        } catch (e) {
                            output.innerHTML += 'Parse error: ' + line + '\n';
                        }
                    }
                }
            } catch (error) {
                output.innerHTML += 'ERROR: ' + error.message + '\n';
            }
        }
    </script>
</body>
</html>
